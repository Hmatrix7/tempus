<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alarm</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="alarm-page">

<button class="back-btn" onclick="goToDashboard()">
    ← Dashboard
</button>

<h1>Alarm</h1>

<div class="layout">

    <!-- LEFT: Circle -->
    <div class="circle">
        <div id="alarmDisplay">--:--:--</div>
        <button id="stopAlarmBtn" class="stop-btn">STOP</button>
    </div>

    <!-- RIGHT: Alarm List -->
    <div class="alarm-panel">
        <h3>Alarms</h3>
        <div id="alarmList"></div>
    </div>

</div>

<div class="controls">

    <div class="time-wrapper">
        <input type="number" id="hourInput" min="1" max="12" placeholder="HH">
        <span>:</span>
        <input type="number" id="minuteInput" min="0" max="59" placeholder="MM">

        <div class="ampm-toggle">
            <button id="amBtn" class="active">AM</button>
            <button id="pmBtn">PM</button>
        </div>
    </div>

    <button id="setAlarm">Set Alarm</button>

</div>

<!-- Modal for Alarm Description -->
<div id="alarmModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2 id="modalTime">--:--</h2>
        <textarea id="modalDescription" placeholder="What is this alarm for?"></textarea>
        <div class="modal-buttons">
            <button onclick="saveDescription()">Save</button>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<audio id="alarmSound"
    src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"
    preload="auto">
</audio>
<br><br>
<a href="index.html">← Back to Dashboard</a>
<script src="js/alarm.js"></script>

</body>
</html>
