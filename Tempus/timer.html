<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="timer-page">

<button class="back-btn" onclick="goToDashboard()">← Dashboard</button>

<h1>Timer</h1>

<div class="layout">

    <!-- LEFT: Circle -->
    <div class="circle">
        <div id="timerDisplay">00:00:00</div>

        <div class="timer-buttons">
            <button id="startBtn">START</button>
            <button id="pauseBtn">PAUSE</button>
            <button id="resetBtn">RESET</button>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="alarm-panel">
        <h3>Quick Start</h3>

        <button onclick="setQuickTimer(5)">5 Minutes</button>
        <button onclick="setQuickTimer(10)">10 Minutes</button>
        <button onclick="setQuickTimer(25)">25 Minutes</button>
        <button onclick="openCustomTime()">+ Custom</button>
    </div>

</div>

<!-- Custom Time Modal -->
<div id="customTimeModal" class="modal">
    <div class="modal-content" style="width:300px; height:220px;">
        <h3>Enter Minutes</h3>
        <input type="number" id="customMinutes" placeholder="e.g. 43" min="1">

        <div class="modal-buttons">
            <button onclick="closeCustomTime()">Cancel</button>
            <button onclick="setCustomTime()">Start</button>
        </div>
    </div>
</div>

<br><br>
<a href="index.html">← Back to Dashboard</a>

<!-- Timer Sound -->
<audio id="timerSound" src="https://www.soundjay.com/button/sounds/alarm-clock-1.mp3" preload="auto"></audio>

<script src="js/timer.js"></script>

</body>
</html>
